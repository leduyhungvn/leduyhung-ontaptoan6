<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ÔN TẬP TRẮC NGHIỆM TOÁN 6</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                packages: {'[+]': ['ams', 'boldsymbol']},
                tags: 'ams',
                multilineWidth: '85%'
            },
            svg: { fontCache: 'global', scale: 1 },
            options: {
                ignoreHtmlClass: 'tex2jax_ignore',
                processHtmlClass: 'tex2jax_process'
            },
            startup: { typeset: false }
        };
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.4;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 10px;
        }
        header {
            text-align: center;
            margin-bottom: 15px;
            padding: 15px;
            background: linear-gradient(135deg, #1e5799, #207cca);
            color: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        .screen {
            display: none;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            padding: 20px;
            margin-bottom: 20px;
        }
        .active {
            display: block;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #2c3e50;
            font-size: 16px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            border-color: #3498db;
            outline: none;
        }
        .row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }
        .col {
            flex: 1;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
            text-align: center;
            margin-right: 10px;
            margin-top: 10px;
            width: 100%;
        }
        .btn:hover {
            background-color: #2980b9;
        }
        .btn-secondary {
            background-color: #7f8c8d;
        }
        .btn-success {
            background-color: #2ecc71;
        }
        .btn-danger {
            background-color: #e74c3c;
        }
        .test-header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        .test-title {
            font-size: 20px;
            font-weight: bold;
            color: #2c3e50;
        }
        .test-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .timer {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: #e74c3c;
            background: #f9f9f9;
            padding: 5px 10px;
            border-radius: 5px;
        }
        .question-counter {
            font-size: 18px;
            font-weight: bold;
        }
        .question {
            margin-bottom: 20px;
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 8px;
            border-left: 4px solid #3498db;
        }
        .question-number {
            font-weight: bold;
            color: #3498db;
            margin-bottom: 8px;
            font-size: 20px;
        }
        .question-content {
            margin-bottom: 12px;
            font-size: 18px;
        }
        .options {
            list-style-type: none;
        }
        .option {
            padding: 10px 15px;
            margin-bottom: 8px;
            background-color: white;
            border-radius: 5px;
            cursor: pointer;
            border: 1px solid #e0e0e0;
            font-size: 18px;
            transition: all 0.2s;
        }
        .option:hover {
            background-color: #f0f7ff;
            border-color: #3498db;
        }
        .option.selected {
            background-color: #e1f0ff;
            border-color: #3498db;
            font-weight: bold;
        }
        .part-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            color: white;
            font-size: 12px;
            margin-right: 5px;
            font-weight: bold;
        }
        .badge-p1 { background-color: #3498db; }
        .badge-p2 { background-color: #9b59b6; }
        .badge-p3 { background-color: #e67e22; }
        .notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(46,204,113,0.9);
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            z-index: 1000;
            display: none;
        }
        .result-header {
            text-align: center;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        .result-wrapper {
            display: flex;
            flex-direction: row;
            gap: 20px;
            align-items: stretch;
            margin-bottom: 20px;
        }
        .result-left {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            background-color: #fff;
            border-radius: 8px;
            text-align: center;
        }
        .student-name-display {
            color: #1890ff;
            font-weight: bold;
            font-size: 50px;
            margin-bottom: 15px;
            line-height: 1.1;
        }
        .chart-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin-bottom: 15px;
            flex-shrink: 0;
        }
        .pie-chart {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(#eee 0% 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 1s ease-out;
        }
        .pie-chart::after {
            content: "";
            position: absolute;
            width: 75%;
            height: 75%;
            background-color: white;
            border-radius: 50%;
        }
        .chart-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .percentage-text {
            display: block;
            font-size: 40px;
            font-weight: 800;
            color: #333;
            line-height: 1;
        }
        .score-detail-text {
            display: block;
            font-size: 20px;
            font-weight: bold;
            color: #666;
            margin-top: 2px;
        }
        .exam-date {
            color: #000;
            font-weight: bold;
            font-size: 18.5px;
            margin-top: auto;
            padding-top: 10px;
            border-top: 1px solid #eee;
            width: 100%;
        }
        .result-right {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 10px;
        }
        .grid-item {
            background-color: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            border: 1px solid #eee;
            transition: all 0.2s ease;
        }
        /* Màu sắc riêng cho từng ô thông tin */
        .grid-item.time-start {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            border-left: 4px solid #4caf50;
        }
        .grid-item.time-end {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            border-left: 4px solid #2196f3;
        }
        .grid-item.wrong {
            background: linear-gradient(135deg, #ffebee 0%, #ffcdd2 100%);
            border-left: 4px solid #f44336;
        }
        .grid-item.unanswered {
            background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
            border-left: 4px solid #ff9800;
        }
        .grid-icon {
            width: 52px;
            height: 52px;
            margin-bottom: 10px;
        }
        /* Màu icon riêng */
        .time-start .grid-icon { color: #2e7d32; stroke: #2e7d32; }
        .time-end .grid-icon { color: #1565c0; stroke: #1565c0; }
        .wrong .grid-icon { color: #c62828; stroke: #c62828; }
        .unanswered .grid-icon { color: #e65100; stroke: #e65100; }
        .grid-label {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .time-start .grid-label { color: #2e7d32; }
        .time-end .grid-label { color: #1565c0; }
        .wrong .grid-label { color: #c62828; }
        .unanswered .grid-label { color: #e65100; }
        .grid-value {
            font-size: 27px;
            font-weight: bold;
        }
        .time-start .grid-value { color: #1b5e20; }
        .time-end .grid-value { color: #0d47a1; }
        .wrong .grid-value { color: #b71c1c; }
        .unanswered .grid-value { color: #bf360c; }
        .review-list {
            margin-top: 20px;
            width: 100%;
        }
        .review-item {
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid;
            background-color: #fff;
            border: 1px solid #eee;
        }
        .review-item.correct {
            border-left-color: #2ecc71;
            background-color: #f0fff4;
        }
        .review-item.incorrect {
            border-left-color: #e74c3c;
            background-color: #fff5f5;
        }
        .review-question-title {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 16px;
        }
        .review-options {
            margin-top: 5px;
        }
        .review-option-row {
            padding: 3px 0;
            font-size: 14px;
        }
        .review-opt-correct {
            color: #2ecc71;
            font-weight: bold;
        }
        .virtual-keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            background: #f0f0f0;
            padding: 10px;
            border-radius: 10px;
            margin-top: 5px;
        }
        .keypad-btn {
            padding: 12px;
            font-size: 20px;
            font-weight: bold;
            background: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .keypad-btn:active {
            background: #ddd;
            transform: scale(0.97);
        }
        .keypad-btn.special {
            background: #ff9800;
            color: white;
        }
        .keypad-btn.ok {
            background: #4caf50;
            color: white;
            grid-column: span 2;
        }
        .number-input {
            width: 100%;
            padding: 14px;
            font-size: 20px;
            text-align: center;
            border: 2px solid #3498db;
            border-radius: 8px;
            background: white;
            margin-bottom: 5px;
        }
        @media (max-width: 768px) {
            .row { flex-direction: column; gap: 10px; }
            .result-wrapper { flex-direction: column; }
            .chart-container { width: 140px; height: 140px; }
            .percentage-text { font-size: 26px; }
            .grid-value { font-size: 14px; }
            .keypad-btn { padding: 10px 0; font-size: 18px; }
        }
        .math-container {
            margin: 5px 0;
            padding: 5px;
            background-color: rgba(255,255,255,0.9);
            border-radius: 3px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>ÔN TẬP TRẮC NGHIỆM TOÁN 6</h1>
    </header>

    <div id="main-screen" class="screen active">
        <div class="form-group">
            <label for="student-name">Họ và tên:</label>
            <input type="text" id="student-name" maxlength="40" placeholder="Nhập họ và tên (tối đa 40 ký tự)">
        </div>
        <div class="form-group">
            <label for="topic-select">Chọn kỳ ôn tập / chương:</label>
            <select id="topic-select">
                <option value="">-- Chọn đề --</option>
                <option value="GK1">GIỮA HỌC KÌ 1 (T6GK1)</option>
                <option value="HK1">CUỐI HỌC KÌ 1 (T6HK1)</option>
                <option value="GK2">GIỮA HỌC KÌ 2 (T6GK2)</option>
                <option value="HK2">CUỐI HỌC KÌ 2 (T6HK2)</option>
                <option value="CH1">Chương I</option>
                <option value="CH2">Chương II</option>
                <option value="CH3">Chương III</option>
                <option value="CH4">Chương IV</option>
                <option value="CH5">Chương V</option>
                <option value="CH6">Chương VI</option>
                <option value="CH7">Chương VII</option>
                <option value="CH8">Chương VIII</option>
                <option value="CH9">Chương IX</option>
            </select>
        </div>
        <div class="form-group">
            <label>Mã kho đề: <span id="code-display" style="font-weight: bold; color: #e74c3c;"></span></label>
        </div>
        <button id="start-btn" class="btn btn-success">Bắt đầu làm bài</button>
        <div class="contact-info" style="background:#f8f9fa; padding:15px; border-radius:8px; text-align:center; font-size:14px; margin-top:15px;">
            <h3 style="color:#2c3e50;">Thông tin liên hệ</h3>
            <p><strong>Thầy Lê Duy Hùng</strong></p>
            <p>ZALO: 0967 095 025</p>
            <p>FACEBOOK: <a href="https://www.facebook.com/leduyhung.vietnam" target="_blank" style="color:#3498db;">https://www.facebook.com/leduyhung.vietnam</a></p>
        </div>
    </div>

    <div id="test-screen" class="screen">
        <div class="test-header-container">
            <div class="test-title" id="test-title"></div>
            <div class="test-info">
                <div class="timer" id="timer">20:00</div>
                <div class="question-counter">Câu <span id="current-question-number">1</span>/<span id="total-questions">20</span></div>
            </div>
        </div>
        <div id="current-question-container"></div>
        <div style="text-align: center;">
            <button id="submit-test-btn" class="btn btn-danger">NỘP BÀI</button>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <div class="result-header"><h2 id="result-title"></h2></div>
        <div class="result-wrapper">
            <div class="result-left">
                <div class="student-name-display" id="result-student-name"></div>
                <div class="chart-container">
                    <div class="pie-chart" id="score-chart"></div>
                    <div class="chart-center">
                        <span class="percentage-text" id="score-percentage">0%</span>
                        <span class="score-detail-text" id="score-detail">0/20</span>
                    </div>
                </div>
                <div class="exam-date" id="result-date"></div>
            </div>
            <div class="result-right">
                <div class="grid-item time-start">
                    <svg class="grid-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    <div class="grid-label">Bắt đầu</div>
                    <div class="grid-value" id="start-time-hms">00:00:00</div>
                </div>
                <div class="grid-item time-end">
                    <svg class="grid-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    <div class="grid-label">Kết thúc</div>
                    <div class="grid-value" id="end-time-hms">00:00:00</div>
                </div>
                <div class="grid-item wrong">
                    <svg class="grid-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="15" y1="9" x2="9" y2="15"></line>
                        <line x1="9" y1="9" x2="15" y2="15"></line>
                    </svg>
                    <div class="grid-label">Sai</div>
                    <div class="grid-value" id="incorrect-count">0/20</div>
                </div>
                <div class="grid-item unanswered">
                    <svg class="grid-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="8"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                    <div class="grid-label">Chưa chọn</div>
                    <div class="grid-value" id="unanswered-count">0/20</div>
                </div>
            </div>
        </div>
        <div class="review-list" id="review-list"></div>
        <div style="text-align: center; margin-top: 20px;">
            <button id="retry-btn" class="btn btn-success">LÀM LẠI</button>
            <button id="back-btn" class="btn btn-secondary">QUAY LẠI</button>
        </div>
    </div>
</div>
<div id="notification" class="notification"></div>

<script>
    // ======================= KHO ĐỀ TOÁN 6 (DỮ LIỆU GIỮ NGUYÊN NỘI DUNG) =======================
    const questionBanks = {};

    // ---------------------- KHO T6HK2 (P3 đa dạng: số nguyên, thập phân 1,2,3 chữ số, âm dương) ----------------------
    questionBanks['T6HK2'] = {
        P1: [
            { "id": 1, "content": "Số đối của \\(-\\frac{5}{3}\\) là:", "correct": "\\(\\frac{5}{3}\\)", "wrong1": "\\(-\\frac{3}{5}\\)", "wrong2": "\\(-\\frac{5}{3}\\)", "wrong3": "\\(\\frac{3}{5}\\)" },
  { "id": 2, "content": "Số nào sau đây **không** viết được dưới dạng hỗn số?", "correct": "\\(-\\frac{3}{15}\\)", "wrong1": "\\(-\\frac{13}{5}\\)", "wrong2": "\\(\\frac{22}{7}\\)", "wrong3": "\\(\\frac{19}{2}\\)" },
  { "id": 3, "content": "Phân số \\(-\\frac{4}{7}\\) có mẫu số là:", "correct": "7", "wrong1": "4", "wrong2": "-4", "wrong3": "-7" },
  { "id": 4, "content": "Phân số bằng \\(\\frac{25}{30}\\) là:", "correct": "\\(\\frac{5}{6}\\)", "wrong1": "\\(-\\frac{5}{6}\\)", "wrong2": "\\(-\\frac{6}{5}\\)", "wrong3": "\\(\\frac{6}{5}\\)" },
  { "id": 5, "content": "Số đối của \\(\\frac{2025}{-2026}\\) là:", "correct": "\\(\\frac{2025}{2026}\\)", "wrong1": "\\(-2025\\)", "wrong2": "\\(\\frac{2025}{-2026}\\)", "wrong3": "\\(\\frac{2026}{2025}\\)" },
  { "id": 6, "content": "Số lớn hơn \\(-\\frac{2}{9}\\) là:", "correct": "2", "wrong1": "\\(-\\frac{7}{9}\\)", "wrong2": "\\(-\\frac{5}{9}\\)", "wrong3": "\\(-\\frac{10}{9}\\)" },
  { "id": 7, "content": "Phân số dương là:", "correct": "\\(\\frac{5}{8}\\)", "wrong1": "\\(-\\frac{2}{3}\\)", "wrong2": "\\(\\frac{4}{-5}\\)", "wrong3": "\\(-\\frac{72}{3}\\)" },
  { "id": 8, "content": "Tìm \\(\\frac{1}{4}\\) của 80kg ta được kết quả là:", "correct": "20kg", "wrong1": "60kg", "wrong2": "40kg", "wrong3": "50kg" },
  { "id": 9, "content": "Làm tròn số 123,31 đến hàng phần mười ta được số:", "correct": "123,3", "wrong1": "123,5", "wrong2": "123,4", "wrong3": "123" },
  { "id": 10, "content": "Tỉ số của 12 và 16 là:", "correct": "\\(\\frac{3}{4}\\)", "wrong1": "\\(\\frac{1}{4}\\)", "wrong2": "\\(\\frac{4}{1}\\)", "wrong3": "\\(\\frac{4}{3}\\)" },
{ "id": 11, "content": "Một đồng xu cân đối có hai mặt S (sấp) và N (ngửa). Nếu ta tung đồng xu một lần thì tập hợp các kết quả có thể xảy ra là:", "correct": "{S; N}", "wrong1": "{S}", "wrong2": "{N; N}", "wrong3": "{S; S}" },
  { "id": 12, "content": "Gieo một con xúc xắc 6 mặt cân đối. Sự kiện \"có thể\" xảy ra là:", "correct": "Số chấm xuất hiện là số lẻ", "wrong1": "Số chấm xuất hiện bằng 9", "wrong2": "Số chấm xuất hiện chia hết cho 10", "wrong3": "Số chấm xuất hiện là số tròn trăm" },
  { "id": 13, "content": "Tung đồng xu 32 lần liên tiếp, có 18 lần xuất hiện mặt sấp. Xác suất thực nghiệm xuất hiện mặt ngửa là:", "correct": "\\(\\frac{7}{16}\\)", "wrong1": "\\(\\frac{18}{32}\\)", "wrong2": "\\(\\frac{12}{32}\\)", "wrong3": "\\(\\frac{3}{8}\\)" },

        P3: [{ id:1, content:"Trung điểm M của AB, AB=10cm thì AM = ... cm", correct:5, answerType:"int", decimals:0 }].concat(Array.from({length:7}, (_,i) => ({ id:i+2, content:`Điểm nằm giữa A và B, AB=${i+6}cm, AM=${i+2}cm thì MB = ... cm`, correct:4, answerType:"int", decimals:0 })))
    };
    questionBanks['T6CH6'] = {
        P1: [{ id:1, content:"Góc vuông có số đo:", correct:"90°", wrong1:"180°", wrong2:"45°", wrong3:"60°" }].concat(Array.from({length:11}, (_,i) => ({ id:i+2, content:`Góc tù có số đo nằm giữa:`, correct:"90° và 180°", wrong1:"0° và 90°", wrong2:"180°", wrong3:"0°" }))),
        P2: [{ id:1, content:"Góc bẹt bằng 180°", correct:"Đúng", wrong1:"Sai" }].concat(Array.from({length:11}, (_,i) => ({ id:i+2, content:`Hai góc kề bù có tổng 180°`, correct:"Đúng", wrong1:"Sai" }))),
        P3: [{ id:1, content:"Góc nhọn < ... độ", correct:90, answerType:"int", decimals:0 }].concat(Array.from({length:7}, (_,i) => ({ id:i+2, content:`Góc phụ với góc ${(i+2)*10}° có số đo ... °`, correct:90-(i+2)*10, answerType:"int", decimals:0 })))
    };
    questionBanks['T6CH7'] = {
        P1: [{ id:1, content:"Hình vuông có mấy trục đối xứng?", correct:"4", wrong1:"2", wrong2:"1", wrong3:"0" }].concat(Array.from({length:11}, (_,i) => ({ id:i+2, content:`Hình chữ nhật có số tâm đối xứng là?`, correct:"1", wrong1:"2", wrong2:"0", wrong3:"4" }))),
        P2: [{ id:1, content:"Hình tròn có vô số trục đối xứng.", correct:"Đúng", wrong1:"Sai" }].concat(Array.from({length:11}, (_,i) => ({ id:i+2, content:`Tam giác đều có 3 trục đối xứng.`, correct:"Đúng", wrong1:"Sai" }))),
        P3: [{ id:1, content:"Hình thang cân có ... trục đối xứng nếu là hình thang vuông?", correct:0, answerType:"int", decimals:0 }].concat(Array.from({length:7}, (_,i) => ({ id:i+2, content:`Hình thoi có ... tâm đối xứng.`, correct:1, answerType:"int", decimals:0 })))
    };
    questionBanks['T6CH8'] = {
        P1: [{ id:1, content:"Biểu đồ cột dùng để so sánh?", correct:"Số liệu", wrong1:"Đường thẳng", wrong2:"Góc", wrong3:"Hình tròn"}].concat(Array.from({length:11}, (_,i) => ({ id:i+2, content:`Mốt của dấu hiệu là?`, correct:"Giá trị có tần số lớn nhất", wrong1:"Trung bình", wrong2:"Tổng", wrong3:"Số trung vị" }))),
        P2: [{ id:1, content:"Trung bình cộng của 2,4,6 là 4.", correct:"Đúng", wrong1:"Sai" }].concat(Array.from({length:11}, (_,i) => ({ id:i+2, content:`Tần suất tính bằng phần trăm.`, correct:"Đúng", wrong1:"Sai" }))),
        P3: [{ id:1, content:"Dãy số 2,4,6,8 có trung bình cộng là ...", correct:5, answerType:"int", decimals:0 }].concat(Array.from({length:7}, (_,i) => ({ id:i+2, content:`Số trung bình của ${i+2}, ${i+4}, ${i+6} là ...`, correct:i+4, answerType:"int", decimals:0 })))
    };
    questionBanks['T6CH9'] = {
        P1: [{ id:1, content:"Xác suất của biến cố chắc chắn bằng?", correct:"1", wrong1:"0", wrong2:"0.5", wrong3:"0.8"}].concat(Array.from({length:11}, (_,i) => ({ id:i+2, content:`Tung đồng xu 1 lần, xác suất mặt ngửa là?`, correct:"0.5", wrong1:"0", wrong2:"1", wrong3:"0.25" }))),
        P2: [{ id:1, content:"Gieo xúc xắc, biến cố 'mặt 7 chấm' là không thể.", correct:"Đúng", wrong1:"Sai" }].concat(Array.from({length:11}, (_,i) => ({ id:i+2, content:`Xác suất luôn nằm từ 0 đến 1.`, correct:"Đúng", wrong1:"Sai" }))),
        P3: [{ id:1, content:"Xác suất lấy được bi đỏ từ 3 đỏ,2 xanh là .../5", correct:3, answerType:"int", decimals:0 }].concat(Array.from({length:7}, (_,i) => ({ id:i+2, content:`Rút 1 thẻ từ 1..${i+7}, xác suất số chẵn là .../${i+7}`, correct:Math.floor((i+7)/2), answerType:"int", decimals:0 })))
    };

    // ========== CÁC HÀM XỬ LÝ CHUNG (giữ nguyên logic) ==========
    function convertQuestionToDisplayFormat(question, partType) {
        if (partType === 'P2') {
            return {
                id: `${partType}-${question.id}`,
                originalId: question.id,
                partType,
                type: 'choice',
                content: question.content,
                options: [{ id: 'A', text: 'Đúng' }, { id: 'B', text: 'Sai' }],
                correctAnswer: (question.correct === "Đúng") ? 'A' : 'B'
            };
        } else if (partType === 'P3') {
            let answerType = question.answerType || 'int';
            let decimals = question.decimals || 0;
            let correctNum = question.correct;
            if (typeof correctNum === 'string') correctNum = parseFloat(correctNum.replace(',','.'));
            return {
                id: `${partType}-${question.id}`,
                originalId: question.id,
                partType,
                type: 'input',
                content: question.content,
                correctAnswer: correctNum,
                answerType,
                decimals
            };
        } else {
            const labels = ['A','B','C','D'];
            let allChoices = [
                { text: question.correct, isCorrect: true },
                { text: question.wrong1, isCorrect: false },
                { text: question.wrong2, isCorrect: false },
                { text: question.wrong3, isCorrect: false }
            ].filter(c => c.text && c.text.trim() !== "");
            let shuffled = shuffleArray([...allChoices]);
            let correctChoice = shuffled.find(c => c.isCorrect);
            let correctIndex = shuffled.indexOf(correctChoice);
            let correctAnswer = labels[correctIndex];
            let options = shuffled.map((choice, idx) => ({ id: labels[idx], text: choice.text }));
            return {
                id: `${partType}-${question.id}`,
                originalId: question.id,
                partType,
                type: 'choice',
                content: question.content,
                options,
                correctAnswer
            };
        }
    }

    function getRandomQuestions(code) {
        let bank = questionBanks[code];
        if (!bank) return [];
        let p1Count = 8, p2Count = 8, p3Count = 4;
        if (code === 'T6HK2') { p1Count = 10; p2Count = 5; p3Count = 5; }
        let process = (partData, need, partType) => {
            if (!partData) return [];
            let shuffled = shuffleArray([...partData]);
            return shuffled.slice(0, Math.min(need, shuffled.length)).map(q => convertQuestionToDisplayFormat(q, partType));
        };
        let p1 = process(bank.P1, p1Count, 'P1');
        let p2 = process(bank.P2, p2Count, 'P2');
        let p3 = process(bank.P3, p3Count, 'P3');
        let all = [...p1, ...p2, ...p3];
        all.forEach((q, idx) => q.displayOrder = idx + 1);
        return all;
    }

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function compareNumericAnswer(userStr, correctNum, decimals) {
        let userNum = parseFloat(userStr.replace(',', '.'));
        if (isNaN(userNum)) return false;
        let factor = Math.pow(10, decimals);
        let roundedUser = Math.round(userNum * factor) / factor;
        let roundedCorrect = Math.round(correctNum * factor) / factor;
        return Math.abs(roundedUser - roundedCorrect) < 1e-9;
    }

    // ========== QUẢN LÝ TRẠNG THÁI (giữ nguyên) ==========
    let currentScreen = 'main-screen';
    let userAnswers = {};
    let testStartTime = null;
    let testSubmitTime = null;
    let timerInterval = null;
    let timeLeft = 1200;
    let currentTestCode = '';
    let currentQuestions = [];
    let studentName = '';
    let currentQuestionIndex = 0;
    let isTransitioning = false;

    function showScreen(screenId) {
        document.getElementById(currentScreen).classList.remove('active');
        document.getElementById(screenId).classList.add('active');
        currentScreen = screenId;
        if (window.MathJax) setTimeout(() => MathJax.typesetPromise(), 100);
    }

    function updateCodeDisplay() {
        let topic = document.getElementById('topic-select').value;
        if (topic) {
            let code = `T6${topic}`;
            document.getElementById('code-display').textContent = code;
            currentTestCode = code;
        } else {
            document.getElementById('code-display').textContent = '';
            currentTestCode = '';
        }
    }

    function startTest() {
        studentName = document.getElementById('student-name').value.trim();
        let topic = document.getElementById('topic-select').value;
        if (!studentName) { alert('Vui lòng nhập họ và tên!'); return; }
        if (!topic) { alert('Vui lòng chọn kỳ ôn tập / chương!'); return; }
        currentTestCode = `T6${topic}`;
        currentQuestions = getRandomQuestions(currentTestCode);
        if (currentQuestions.length === 0) { alert('Kho đề trống, vui lòng chọn lại.'); return; }
        userAnswers = {};
        timeLeft = 1200;
        testStartTime = new Date();
        currentQuestionIndex = 0;
        isTransitioning = false;
        let topicText = document.getElementById('topic-select').options[document.getElementById('topic-select').selectedIndex].text;
        document.getElementById('test-title').textContent = `TOÁN LỚP 6 - ${topicText}`;
        renderCurrentQuestion();
        startTimer();
        showScreen('test-screen');
        document.addEventListener('visibilitychange', handleVisibilityChange);
    }

    function handleVisibilityChange() {
        if (document.hidden) { clearInterval(timerInterval); submitTest(); }
    }

    function startTimer() {
        clearInterval(timerInterval);
        updateTimerDisplay();
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerDisplay();
            if (timeLeft <= 0) { clearInterval(timerInterval); submitTest(); }
        }, 1000);
    }

    function updateTimerDisplay() {
        let m = Math.floor(timeLeft / 60);
        let s = timeLeft % 60;
        document.getElementById('timer').textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        if (timeLeft <= 60) document.getElementById('timer').style.color = '#e74c3c';
        else document.getElementById('timer').style.color = '#e74c3c';
    }

    function showNotification(msg, dur = 1000) {
        let n = document.getElementById('notification');
        n.textContent = msg;
        n.style.display = 'block';
        setTimeout(() => n.style.display = 'none', dur);
    }

    function getPartBadgeClass(p) {
        if (p === 'P1') return 'badge-p1';
        if (p === 'P2') return 'badge-p2';
        return 'badge-p3';
    }

    function createVirtualKeypad(inputEl, onOk) {
        let div = document.createElement('div');
        div.className = 'virtual-keypad';
        let btns = ['7','8','9','DEL','4','5','6','-','1','2','3','.','0','OK','C'];
        btns.forEach(b => {
            let btn = document.createElement('div');
            btn.className = 'keypad-btn';
            if (b === 'OK') btn.classList.add('ok');
            if (b === 'DEL' || b === 'C') btn.classList.add('special');
            btn.textContent = b;
            btn.addEventListener('click', () => {
                if (b === 'DEL') inputEl.value = inputEl.value.slice(0, -1);
                else if (b === 'C') inputEl.value = '';
                else if (b === 'OK') onOk();
                else inputEl.value += b;
            });
            div.appendChild(btn);
        });
        return div;
    }

    function renderCurrentQuestion() {
        let q = currentQuestions[currentQuestionIndex];
        let partLabel = q.partType === 'P1' ? 'Phần 1' : (q.partType === 'P2' ? 'Phần 2 (Đ/S)' : 'Phần 3 (Điền)');
        let html = `
            <div class="question">
                <div class="question-number">
                    <span class="part-badge ${getPartBadgeClass(q.partType)}">${partLabel}</span>
                    Câu ${q.displayOrder} - ${currentTestCode}
                </div>
                <div class="question-content"><div class="math-container">${q.content}</div></div>
        `;
        if (q.type === 'input') {
            let saved = userAnswers[q.id] || '';
            html += `
                <input type="text" id="num-input-${q.id}" class="number-input" value="${saved}" placeholder="Nhập đáp số">
                <div id="keypad-${q.id}"></div>
            `;
        } else {
            let opsHTML = '';
            q.options.forEach(opt => {
                let cls = (userAnswers[q.id] === opt.id) ? 'selected' : '';
                opsHTML += `<li class="option ${cls}" data-question="${q.id}" data-option="${opt.id}"><div class="math-container"><strong>${opt.id}.</strong> ${opt.text}</div></li>`;
            });
            html += `<ul class="options">${opsHTML}</ul>`;
        }
        html += `</div>`;
        document.getElementById('current-question-container').innerHTML = html;
        document.getElementById('current-question-number').textContent = currentQuestionIndex + 1;
        document.getElementById('total-questions').textContent = currentQuestions.length;

        if (q.type !== 'input') {
            document.querySelectorAll('.option').forEach(opt => {
                opt.addEventListener('click', function() {
                    if (isTransitioning) return;
                    isTransitioning = true;
                    userAnswers[this.dataset.question] = this.dataset.option;
                    showNotification("Đã chọn đáp án!");
                    setTimeout(() => {
                        if (currentQuestionIndex >= currentQuestions.length - 1) submitTest();
                        else { currentQuestionIndex++; renderCurrentQuestion(); isTransitioning = false; }
                    }, 800);
                });
            });
        } else {
            let inp = document.getElementById(`num-input-${q.id}`);
            let keyCont = document.getElementById(`keypad-${q.id}`);
            let handleOk = () => {
                if (isTransitioning) return;
                let ans = inp.value.trim();
                if (ans === '') { showNotification("Vui lòng nhập đáp số!", 800); return; }
                isTransitioning = true;
                userAnswers[q.id] = ans;
                showNotification("Đã ghi nhận đáp số!");
                setTimeout(() => {
                    if (currentQuestionIndex >= currentQuestions.length - 1) submitTest();
                    else { currentQuestionIndex++; renderCurrentQuestion(); isTransitioning = false; }
                }, 800);
            };
            keyCont.appendChild(createVirtualKeypad(inp, handleOk));
            inp.addEventListener('keypress', e => { if (e.key === 'Enter') { e.preventDefault(); handleOk(); } });
        }
        if (window.MathJax) setTimeout(() => MathJax.typesetPromise(), 200);
    }

    function submitTest() {
        clearInterval(timerInterval);
        testSubmitTime = new Date();
        document.removeEventListener('visibilitychange', handleVisibilityChange);
        showResults();
    }

    function getScoreColor(p) {
        if (p < 50) return '#f5222d';
        if (p < 70) return '#faad14';
        if (p < 80) return '#52c41a';
        if (p < 90) return '#13c2c2';
        if (p < 100) return '#1890ff';
        return '#722ed1';
    }

    function formatTimeHMS(d) {
        return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}:${d.getSeconds().toString().padStart(2,'0')}`;
    }

    function calculateScore() {
        let correct = 0, incorrect = 0, unanswered = 0;
        currentQuestions.forEach(q => {
            let ans = userAnswers[q.id];
            if (!ans) unanswered++;
            else {
                if (q.type === 'input') {
                    if (compareNumericAnswer(ans, q.correctAnswer, q.decimals)) correct++;
                    else incorrect++;
                } else {
                    if (ans === q.correctAnswer) correct++;
                    else incorrect++;
                }
            }
        });
        return { correct, incorrect, unanswered, percentage: Math.round((correct / currentQuestions.length) * 100) };
    }

    function renderReviewQuestions() {
        let cont = document.getElementById('review-list');
        cont.innerHTML = '';
        currentQuestions.forEach(q => {
            let ans = userAnswers[q.id];
            if (!ans) return;
            let isCorrect = (q.type === 'input') ? compareNumericAnswer(ans, q.correctAnswer, q.decimals) : (ans === q.correctAnswer);
            let statusClass = isCorrect ? 'correct' : 'incorrect';
            let optHTML = '';
            if (q.type === 'input') {
                let cd = q.correctAnswer;
                if (q.decimals > 0) cd = cd.toFixed(q.decimals);
                optHTML = `<div class="review-option-row">Đáp án đã nhập: <strong>${ans}</strong></div>
                           <div class="review-option-row review-opt-correct">Đáp án đúng: ${cd}</div>`;
            } else {
                q.options.forEach(o => {
                    let style = '';
                    if (o.id === q.correctAnswer) style = 'color:#2ecc71; font-weight:bold;';
                    else if (o.id === ans && !isCorrect) style = 'color:#e74c3c; text-decoration:line-through;';
                    optHTML += `<div class="review-option-row" style="${style}"><div class="math-container"><strong>${o.id}.</strong> ${o.text}</div></div>`;
                });
            }
            let partLabel = q.partType;
            let div = document.createElement('div');
            div.className = `review-item ${statusClass}`;
            div.innerHTML = `
                <div class="review-question-title"><span class="part-badge ${getPartBadgeClass(q.partType)}">${partLabel}</span> Câu ${q.displayOrder} (id gốc: ${q.originalId})</div>
                <div class="question-content" style="font-size:16px;"><div class="math-container">${q.content}</div></div>
                <div class="review-options">${optHTML}</div>
            `;
            cont.appendChild(div);
        });
        if (window.MathJax) setTimeout(() => MathJax.typesetPromise(), 300);
    }

    function showResults() {
        let topic = document.getElementById('topic-select').options[document.getElementById('topic-select').selectedIndex]?.text || '';
        document.getElementById('result-title').textContent = `TOÁN LỚP 6 - ${topic} - KẾT QUẢ`;
        let { correct, incorrect, unanswered, percentage } = calculateScore();
        document.getElementById('result-student-name').textContent = studentName;
        let chart = document.getElementById('score-chart');
        chart.style.background = `conic-gradient(${getScoreColor(percentage)} ${percentage}%, #eee ${percentage}% 100%)`;
        document.getElementById('score-percentage').textContent = `${percentage}%`;
        document.getElementById('score-detail').textContent = `${correct}/${currentQuestions.length}`;
        let date = testSubmitTime;
        document.getElementById('result-date').textContent = `${date.getDate().toString().padStart(2,'0')}/${(date.getMonth()+1).toString().padStart(2,'0')}/${date.getFullYear()}`;
        document.getElementById('start-time-hms').textContent = formatTimeHMS(testStartTime);
        document.getElementById('end-time-hms').textContent = formatTimeHMS(testSubmitTime);
        document.getElementById('incorrect-count').textContent = `${incorrect}/${currentQuestions.length}`;
        document.getElementById('unanswered-count').textContent = `${unanswered}/${currentQuestions.length}`;
        renderReviewQuestions();
        showScreen('result-screen');
    }

    function retryTest() {
        currentQuestions = getRandomQuestions(currentTestCode);
        if (!currentQuestions.length) { alert('Lỗi đề'); showScreen('main-screen'); return; }
        userAnswers = {};
        timeLeft = 1200;
        testStartTime = new Date();
        currentQuestionIndex = 0;
        isTransitioning = false;
        renderCurrentQuestion();
        startTimer();
        document.addEventListener('visibilitychange', handleVisibilityChange);
        showScreen('test-screen');
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('topic-select').addEventListener('change', updateCodeDisplay);
        document.getElementById('start-btn').addEventListener('click', startTest);
        document.getElementById('submit-test-btn').addEventListener('click', submitTest);
        document.getElementById('retry-btn').addEventListener('click', retryTest);
        document.getElementById('back-btn').addEventListener('click', () => showScreen('main-screen'));
        updateCodeDisplay();
    });
</script>
</body>
</html>
